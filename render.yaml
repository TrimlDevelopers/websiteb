# Recommended Render settings for this monorepo
services:
  - type: web
    name: triml-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --include=optional && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
