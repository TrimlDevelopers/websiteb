# Render services for Tribound Tech website
services:
  - type: web
    name: triml-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --include=optional && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # Set this in the Render dashboard to your deployed Express URL (no trailing slash)
      - key: VITE_API_URL
        sync: false
      - key: VITE_SITE_URL
        value: https://websiteb-f1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: triml-backend
    runtime: node
    rootDir: backend
    # IMPORTANT in Render dashboard:
    #   Build Command: npm ci && npm run build
    #   Start Command: npm start   (NOT npm run dev)
    # Do not set PORT — Render provides it.
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: FRONTEND_URL
        value: https://websiteb-f1.onrender.com,http://localhost:5173
      - key: MONGODB_URI
        sync: false
      - key: SMTP_SERVER
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: enquiry@triboundtech.com
      - key: MAIL_FROM_NAME
        value: Tribound Tech
      - key: CONTACT_TO_EMAIL
        value: info@triboundtech.com
