# Render Blueprint for Tribound Tech
# If the service was created manually, you MUST also set these in the dashboard —
# render.yaml is NOT applied automatically to existing services.
#
# Public route rewrites MUST stay aligned with frontend/src/utils/seo.ts `allRoutes`.

services:
  - type: web
    name: triml-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --include=optional && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: VITE_API_URL
        sync: false
      - key: VITE_SITE_URL
        value: https://triboundtech.com
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=604800
      - path: /og-image.svg
        name: Cache-Control
        value: public, max-age=604800
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=86400
      - path: /admin/*
        name: X-Robots-Tag
        value: noindex, nofollow
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      # Serve prerendered HTML for each public route before the SPA fallback.
      - type: rewrite
        source: /services/custom-software
        destination: /services/custom-software/index.html
      - type: rewrite
        source: /services/website-development
        destination: /services/website-development/index.html
      - type: rewrite
        source: /services/mobile-app-development
        destination: /services/mobile-app-development/index.html
      - type: rewrite
        source: /services/microservices
        destination: /services/microservices/index.html
      - type: rewrite
        source: /services/business-automation
        destination: /services/business-automation/index.html
      - type: rewrite
        source: /services/data-analytics
        destination: /services/data-analytics/index.html
      - type: rewrite
        source: /services
        destination: /services/index.html
      - type: rewrite
        source: /products
        destination: /products/index.html
      - type: rewrite
        source: /industries
        destination: /industries/index.html
      - type: rewrite
        source: /about
        destination: /about/index.html
      - type: rewrite
        source: /contact
        destination: /contact/index.html
      - type: rewrite
        source: /faq
        destination: /faq/index.html
      - type: rewrite
        source: /privacy
        destination: /privacy/index.html
      - type: rewrite
        source: /terms
        destination: /terms/index.html
      # Client-only admin + unknown paths
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: triml-backend
    runtime: node
    # Critical: build/run the backend package, not the monorepo root
    rootDir: backend
    buildCommand: npm ci && npm run build
    # Critical: production start — NEVER "npm run dev"
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: FRONTEND_URL
        value: https://triboundtech.com,https://www.triboundtech.com,https://websiteb-f1.onrender.com,http://localhost:5173
      - key: MONGODB_URI
        sync: false
      - key: SMTP_SERVER
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: enquiry@triboundtech.com
      - key: MAIL_FROM_NAME
        value: Tribound Tech
      - key: CONTACT_TO_EMAIL
        value: info@triboundtech.com
